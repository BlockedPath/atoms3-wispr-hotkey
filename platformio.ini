; AtomS3 -> Wispr Flow push-to-talk button (BLE HID keyboard)
;
; Version pins matter: the ESP32-BLE-Keyboard library does NOT compile cleanly
; on the current ESP32 Arduino core 3.x. The stable, documented combo is:
;   arduino-esp32 core 2.0.x  +  NimBLE-Arduino 1.4.x  +  -DUSE_NIMBLE
; PlatformIO locks all of that here so the build is reproducible.

[platformio]
default_envs = atoms3

[env:atoms3]
platform = espressif32@6.9.0         ; -> arduino-esp32 core 2.0.x
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200

build_flags =
    -DUSE_NIMBLE                     ; NimBLE backend in ESP32-BLE-Keyboard (low RAM, stable)
    -Wno-deprecated-declarations     ; pinned M5Unified/Arduino core 2.x emits deprecation warnings in libdeps

lib_deps =
    m5stack/M5Unified@^0.1.16        ; button + LCD (pinned for reproducibility)
    t-vk/ESP32 BLE Keyboard@^0.3.2   ; BLE HID keyboard
    h2zero/NimBLE-Arduino@^1.4.1     ; MUST be 1.4.x -- 2.x breaks the keyboard lib
    ; WiFi + ArduinoOTA are bundled with the ESP32 Arduino core (no lib_dep needed)

; Wireless flashing target. After the OTA-capable firmware is on the device,
; flash with:  pio run -e atoms3-ota -t upload   (no USB cable needed)
[env:atoms3-ota]
extends = env:atoms3
upload_protocol = espota
upload_port = atom-hotkey.local      ; matches OTA_HOSTNAME in secrets.h
upload_flags =
    --auth=${sysenv.ASSCLETS_OTA_PASSWORD}
